<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>PlayMatrix Health Pro</title>
  <style>
    :root{--bg:#07111f;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.08);--text:#edf4ff;--muted:rgba(237,244,255,.7);--accent:#3b82f6;--accent2:#60a5fa;--ok:#34d399;--warn:#fbbf24;--danger:#fb7185;--radius:24px;--shadow:0 28px 60px rgba(0,0,0,.34);--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#0f2343 0%, #07111f 42%, #07111f 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;overflow-x:hidden}
    body{padding:22px 16px 34px;touch-action:manipulation}
    .wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
    .title{margin:0;font-size:clamp(32px,6vw,56px);line-height:1.02;font-weight:900;letter-spacing:-.03em}
    .subtitle{margin-top:8px;color:var(--muted);font-size:clamp(16px,2.2vw,24px)}
    .badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .badge{display:inline-flex;align-items:center;gap:12px;min-height:50px;padding:0 16px;border-radius:999px;border:1px solid var(--line);font-size:18px;font-weight:900;background:rgba(255,255,255,.03)}
    .badge::before{content:"";width:15px;height:15px;border-radius:999px;background:rgba(255,255,255,.35)}
    .badge.ok{color:var(--ok)} .badge.ok::before{background:var(--ok)}
    .badge.warn{color:var(--warn)} .badge.warn::before{background:var(--warn)}
    .badge.error{color:var(--danger)} .badge.error::before{background:var(--danger)}
    .grid{display:grid;gap:16px}.g-2{grid-template-columns:1.1fr .9fr}.g-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:8px}.field label{font-size:14px;font-weight:800;color:var(--muted)}
    input,button{font:inherit} input{font-size:16px}
    .input{width:100%;border-radius:18px;padding:16px 18px;border:1px solid var(--line);background:#06101d;color:var(--text);outline:none}
    .input:focus{border-color:rgba(96,165,250,.75);box-shadow:0 0 0 4px rgba(59,130,246,.14)}
    .buttons{display:flex;flex-wrap:wrap;gap:12px}.buttons button{border:0;border-radius:18px;padding:16px 22px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(180deg,var(--accent2),var(--accent))}.buttons .secondary{background:rgba(37,99,235,.18);border:1px solid rgba(96,165,250,.18)}
    .status{padding:16px 18px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);line-height:1.6;word-break:break-word}.status.ok{border-color:rgba(52,211,153,.28)}.status.warn{border-color:rgba(251,191,36,.24)}.status.error{border-color:rgba(251,113,133,.26)}
    .metric{padding:18px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.03)}.metric .k{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}.metric .v{margin-top:10px;font-size:clamp(24px,4vw,42px);font-weight:900}
    .mono{font-family:var(--mono)}
    pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:13px;line-height:1.6}
    .json{max-height:520px;overflow:auto;background:#05101c;border:1px solid var(--line);border-radius:18px;padding:16px}
    @media (max-width:980px){.g-2{grid-template-columns:1fr}.g-4{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:640px){body{padding:18px 12px 26px}.card{padding:18px}.g-4{grid-template-columns:1fr}.buttons button{width:100%}}
  </style>
  <link rel="stylesheet" href="/premium-phase5.css" />
  <script src="/premium-phase5.js" defer></script>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1 class="title">PlayMatrix Health Dashboard</h1>
      <div class="subtitle">Canlı deployment, bellek, uptime ve proses sağlığını profesyonel görünümle izle</div>
      <div class="badges">
        <div class="badge warn" id="authBadge">Oturum aranıyor...</div>
        <div class="badge warn" id="healthBadge">Health bekleniyor...</div>
      </div>
    </section>

    <section class="card">
      <div class="grid g-2">
        <div class="field">
          <label for="baseInput">API tabanı</label>
          <input id="baseInput" class="input mono" placeholder="/api veya tam backend URL" />
        </div>
        <div class="field">
          <label for="manualToken">Yedek Bearer token</label>
          <input id="manualToken" class="input" type="password" placeholder="Otomatik giriş yoksa token gir" />
        </div>
      </div>
      <div class="buttons" style="margin-top:14px">
        <button id="saveBtn" type="button">Bağlantıyı Kaydet</button>
        <button id="reloadBtn" class="secondary" type="button">Health Yenile</button>
      </div>
      <div class="status" id="statusBox" style="margin-top:14px">Health sistemi hazırlanıyor...</div>
    </section>

    <section class="grid g-4" id="metricGrid"></section>

    <section class="card">
      <div style="font-size:14px;color:var(--muted);margin-bottom:10px">Ham JSON</div>
      <div class="json"><pre id="rawOutput">Hazır.</pre></div>
    </section>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, browserLocalPersistence, setPersistence, onIdTokenChanged, getIdToken } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyC81Ah46_F2his90zedODoCk07vqsd3vVs',
      authDomain: 'playmatrix-b7df9.firebaseapp.com',
      projectId: 'playmatrix-b7df9',
      storageBucket: 'playmatrix-b7df9.firebasestorage.app',
      messagingSenderId: '689686425310',
      appId: '1:689686425310:web:01c9f797b437a770e19c4f',
      measurementId: 'G-BL9ZP43VVW'
    };
    const REMOTE_FALLBACKS = ['https://emirhan-siye.onrender.com/api'];
    const DEFAULT_API_BASE = `${window.location.origin.replace(/\/+$/, '')}/api`;

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    setPersistence(auth, browserLocalPersistence).catch(() => {});

    const state = { apiBase:'/api', activeBase:'/api', autoToken:'', manualToken:'', authReady:false, user:null };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const fmt = (value) => Number(value || 0).toLocaleString('tr-TR');

    function normalizeApiBase(rawInput='') {
      let raw = String(rawInput || '').trim();
      if (!raw) return '/api';
      raw = raw.replace(/^ttps:\/\//i,'https://').replace(/^htps:\/\//i,'https://').replace(/^tps:\/\//i,'https://');
      if (/^\/?ap$/i.test(raw) || /^\/?api$/i.test(raw)) return '/api';
      if (raw.startsWith('/')) {
        const path = raw.replace(/\/+$/, '');
        if (!path || path === '/' || path === '/admin') return '/api';
        return /\/api(?:$|\/)/i.test(path) ? path : `${path}/api`.replace(/\/\/+/, '/');
      }
      if (!/^https?:\/\//i.test(raw)) raw = raw.includes('.') ? `https://${raw}` : `/${raw}`;
      if (raw.startsWith('/')) return normalizeApiBase(raw);
      const url = new URL(raw);
      let pathname = (url.pathname || '').replace(/\/+$/, '');
      if (!pathname || pathname === '/' || pathname === '/admin' || pathname === '/ap') pathname = '/api';
      else if (!/\/api(?:$|\/)/i.test(pathname)) pathname = `${pathname}/api`;
      return `${url.origin}${pathname}`;
    }

    function joinApiUrl(base, path) {
      const normalized = normalizeApiBase(base);
      const cleanPath = String(path || '').startsWith('/') ? String(path) : `/${String(path || '')}`;
      return `${normalized.replace(/\/$/, '')}${cleanPath}`;
    }

    function currentToken() { return state.autoToken || state.manualToken || ''; }

    function setBadge(id, text, tone='warn') {
      const el = $(id); el.className = `badge ${tone}`; el.textContent = text;
    }

    function setStatus(text, tone='warn') {
      const el = $('statusBox'); el.className = `status ${tone}`; el.innerHTML = text;
    }

    async function readJsonSafe(response) {
      const text = await response.text().catch(() => '');
      if (!text) return {};
      try { return JSON.parse(text); } catch (_) { return { raw: text }; }
    }

    async function probeBase(base) {
      const normalized = normalizeApiBase(base);
      try {
        const response = await fetch(joinApiUrl(normalized, '/healthz'), { credentials:'omit' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return normalized;
      } catch (_) { return null; }
    }

    async function probeAdminCapability(base, token, preferredPath) {
      const normalized = normalizeApiBase(base);
      const probePaths = [preferredPath, '/admin/ping', '/admin/deployment-health', '/admin/overview']
        .filter(Boolean)
        .filter((item, idx, arr) => arr.indexOf(item) === idx);
      for (const probePath of probePaths) {
        try {
          const response = await fetch(joinApiUrl(normalized, probePath), {
            method: 'GET',
            headers: token ? { 'Authorization': `Bearer ${token}` } : {},
            credentials:'omit'
          });
          const payload = await readJsonSafe(response);
          if (response.ok && payload?.ok !== false) return { ok: true, base: normalized, path: probePath };
          if (response.status === 401 || response.status === 403) return { ok: false, base: normalized, authError: true, error: payload?.error || `HTTP ${response.status}` };
        } catch (_) {}
      }
      return { ok: false, base: normalized, missing: true, error: 'ADMIN_CAPABILITY_MISSING' };
    }

    async function chooseBase(preferred='') {
      const token = currentToken();
      const candidates = [preferred || state.apiBase, DEFAULT_API_BASE, '/api', ...REMOTE_FALLBACKS].map(normalizeApiBase).filter((item, idx, arr) => item && arr.indexOf(item) === idx);
      let firstHealthy = '';
      let firstAuthError = '';
      for (const candidate of candidates) {
        const okBase = await probeBase(candidate);
        if (!okBase) continue;
        firstHealthy = firstHealthy || okBase;
        const capability = await probeAdminCapability(okBase, token, '/admin/deployment-health');
        if (capability.ok) { state.activeBase = capability.base; return capability.base; }
        if (capability.authError && !firstAuthError) firstAuthError = capability.error || 'Yönetici yetkisi gerekli.';
      }
      state.activeBase = normalizeApiBase(firstHealthy || preferred || state.apiBase || '/api');
      if (firstAuthError) {
        setStatus(`Admin endpoint bulundu ama yetki reddedildi: <strong>${escapeHtml(firstAuthError)}</strong>`, 'error');
      } else {
        setStatus(`Health endpoint bulundu ama admin health endpoint bulunamadı. Aktif taban: <span class="mono">${escapeHtml(state.activeBase)}</span>`, 'error');
      }
      return state.activeBase;
    }

    async function healthApi() {

      const token = currentToken();
      if (!token) throw new Error('Admin token bulunamadı.');
      const response = await fetch(joinApiUrl(state.activeBase, '/admin/ops/health'), {
        headers: { 'Authorization': `Bearer ${token}` },
        credentials:'omit'
      });
      const payload = await readJsonSafe(response);
      if (!response.ok || payload?.ok === false) throw new Error(payload?.error || `HTTP ${response.status}`);
      return payload;
    }

    function renderMetrics(data={}) {
      const deployment = data.deployment || data.health?.process || {};
      const counters = data.health?.counters || {};
      const memory = deployment.memory || data.health?.process?.memory || {};
      const items = [
        ['Node', deployment.node || '-'],
        ['Uptime', `${fmt(deployment.uptimeSec)} sn`],
        ['PID', fmt(deployment.pid)],
        ['Kullanıcı', fmt(deployment.userCount || counters.userCount)],
        ['Ticket', fmt(deployment.ticketCount || counters.ticketCount)],
        ['Audit', fmt(deployment.auditCount || counters.auditCount)],
        ['RSS', fmt(memory.rss)],
        ['Heap Used', fmt(memory.heapUsed)]
      ];
      $('metricGrid').innerHTML = items.map(([k,v]) => `<div class="metric"><div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(v)}</div></div>`).join('');
    }

    async function refreshAutoToken(force=false) {
      const user = auth.currentUser;
      if (!user) {
        state.autoToken = ''; state.user = null; state.authReady = true; updateAuthUi(); return false;
      }
      try {
        state.autoToken = await getIdToken(user, force);
        state.user = { uid:user.uid, email:user.email || '' };
        state.authReady = true;
        updateAuthUi();
        return true;
      } catch (_) {
        state.autoToken = ''; state.user = null; state.authReady = true; updateAuthUi(); return false;
      }
    }

    function updateAuthUi() {
      if (state.autoToken) setBadge('authBadge', `Otomatik giriş aktif · ${state.user?.email || state.user?.uid || 'admin'}`, 'ok');
      else if (state.manualToken) setBadge('authBadge', 'Manuel token hazır', 'warn');
      else if (state.authReady) setBadge('authBadge', 'Oturum bulunamadı', 'error');
      else setBadge('authBadge', 'Oturum aranıyor...', 'warn');
    }

    async function loadHealth(forceToken=false) {
      if (forceToken && auth.currentUser) await refreshAutoToken(true);
      if (!currentToken()) {
        setBadge('healthBadge', 'Token bekleniyor', 'warn');
        setStatus('Health yüklemek için admin oturumu ya da yedek bearer token gerekli.', 'warn');
        return;
      }

      state.apiBase = normalizeApiBase($('baseInput').value.trim() || state.apiBase);
      state.manualToken = $('manualToken').value.trim();
      localStorage.setItem('pm_admin_api', state.apiBase);
      if (state.manualToken) localStorage.setItem('pm_admin_manual_token', state.manualToken);
      else localStorage.removeItem('pm_admin_manual_token');

      setBadge('healthBadge', 'Health yükleniyor...', 'warn');
      setStatus('Health verisi yükleniyor...', 'warn');
      await chooseBase(state.apiBase);

      try {
        const payload = await healthApi();
        renderMetrics(payload);
        $('rawOutput').textContent = JSON.stringify(payload, null, 2);
        setBadge('healthBadge', 'Health hazır', 'ok');
        setStatus(`Aktif backend: <span class="mono">${escapeHtml(state.activeBase)}</span><br/>Sistem sağlığı başarıyla alındı.`, 'ok');
      } catch (error) {
        $('rawOutput').textContent = error.message || 'Health yüklenemedi.';
        setBadge('healthBadge', 'Health hatası', 'error');
        setStatus(`Health isteği başarısız: <strong>${escapeHtml(error.message || 'Bilinmeyen hata')}</strong>`, 'error');
      }
    }

    function hydrate() {
      state.apiBase = normalizeApiBase(localStorage.getItem('pm_admin_api') || '/api');
      state.manualToken = (localStorage.getItem('pm_admin_manual_token') || '').trim();
      $('baseInput').value = state.apiBase;
      $('manualToken').value = state.manualToken;
      $('metricGrid').innerHTML = '<div class="metric"><div class="k">Durum</div><div class="v">Bekleniyor</div></div>';
      updateAuthUi();
    }

    function bind() {
      $('saveBtn').addEventListener('click', () => loadHealth(true));
      $('reloadBtn').addEventListener('click', () => loadHealth(true));
      $('baseInput').addEventListener('blur', () => { $('baseInput').value = normalizeApiBase($('baseInput').value); });
    }

    onIdTokenChanged(auth, async (user) => {
      state.authReady = true;
      if (!user) {
        state.user = null; state.autoToken = ''; updateAuthUi();
        if (state.manualToken) loadHealth();
        return;
      }
      state.user = { uid:user.uid, email:user.email || '' };
      state.autoToken = await getIdToken(user, true).catch(() => '');
      updateAuthUi();
      loadHealth();
    });

    hydrate();
    bind();
    if (state.manualToken) loadHealth();
  </script>
</body>
</html>
